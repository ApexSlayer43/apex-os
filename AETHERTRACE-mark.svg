<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-20 0 1100 330"
     width="1100" height="330"
     role="img" aria-label="AetherTrace wordmark">

  <defs>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=IBM+Plex+Mono:wght@300&amp;display=swap');

      .ring-front {
        animation: ringGlow 4s ease-in-out infinite;
      }
      @keyframes ringGlow {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.75; }
      }

      .node-outer {
        animation: nodePulse 4s ease-in-out infinite;
      }
      @keyframes nodePulse {
        0%,100% { opacity: 0.18; r: 18; }
        50%      { opacity: 0.32; r: 24; }
      }
    </style>

    <!-- Ring glow blur -->
    <filter id="fRing" x="-12%" y="-80%" width="124%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node soft glow -->
    <filter id="fNode" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wordmark soft drop -->
    <filter id="fWord" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="rgba(200,220,255,0.07)"/>
    </filter>

    <!-- Ring gradient: fades in from left, peaks center, fades out right -->
    <linearGradient id="gRing" x1="40" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7EB8F7" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#7EB8F7" stop-opacity="0.40"/>
      <stop offset="28%"  stop-color="#C8DCFF" stop-opacity="0.70"/>
      <stop offset="48%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="52%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="72%"  stop-color="#C8DCFF" stop-opacity="0.70"/>
      <stop offset="92%"  stop-color="#7EB8F7" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#7EB8F7" stop-opacity="0"/>
    </linearGradient>

    <!-- Background ambient -->
    <radialGradient id="gBg" cx="50%" cy="46%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#061428"/>
      <stop offset="100%" stop-color="#02050B" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip: back half of ring (above cy=155) -->
    <clipPath id="cpBack">
      <rect x="-30" y="-10" width="1140" height="165"/>
    </clipPath>

    <!-- Clip: front half of ring (below cy=155) -->
    <clipPath id="cpFront">
      <rect x="-30" y="155" width="1140" height="200"/>
    </clipPath>

  </defs>


  <!-- ── BACKGROUND ─────────────────────────────────── -->
  <rect x="-20" y="0" width="1100" height="330" fill="#02050B"/>
  <rect x="-20" y="0" width="1100" height="330" fill="url(#gBg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.9" fill="rgba(22,48,88,0.18)"/>
  </pattern>
  <rect x="-20" y="0" width="1100" height="330" fill="url(#dots)"/>


  <!-- ── RING BACK (dim, behind wordmark) ───────────── -->
  <ellipse
    cx="520" cy="155" rx="440" ry="108"
    stroke="rgba(126,184,247,0.18)" stroke-width="1.5" fill="none"
    transform="rotate(-12 520 155)"
    clip-path="url(#cpBack)"/>


  <!-- ── SUBTITLE ───────────────────────────────────── -->
  <text
    x="218" y="228"
    text-anchor="start"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="10" letter-spacing="5"
    fill="rgba(90,120,160,0.52)">NEUTRAL EVIDENCE TRUSTEE</text>


  <!-- ── WORDMARK ───────────────────────────────────── -->
  <text
    x="520" y="202"
    text-anchor="middle"
    font-family="'Bebas Neue', Impact, sans-serif"
    font-size="118" letter-spacing="8"
    fill="#FFFFFF"
    filter="url(#fWord)">AETHERTRACE</text>


  <!-- ── RING FRONT (bright gradient, in front of wordmark) -->
  <ellipse
    cx="520" cy="155" rx="440" ry="108"
    stroke="url(#gRing)" stroke-width="2" fill="none"
    transform="rotate(-12 520 155)"
    clip-path="url(#cpFront)"
    filter="url(#fRing)"
    class="ring-front"/>


  <!-- ── CUSTODY NODE ───────────────────────────────── -->
  <!--
    Position: t = 72° on tilted ellipse
    x = 520 + 440·cos(72°)·cos(-12°) − 108·sin(72°)·sin(-12°)  ≈  674
    y = 155 + 440·cos(72°)·sin(-12°) + 108·sin(72°)·cos(-12°)  ≈  227
    y > 155 → front of ring ✓
  -->
  <circle cx="674" cy="227" r="20" fill="#7EB8F7" class="node-outer" filter="url(#fNode)"/>
  <circle cx="674" cy="227" r="5"  fill="#7EB8F7"/>

</svg>
